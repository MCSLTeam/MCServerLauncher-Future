name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  benchmarks:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Find benchmark project
        id: benchmark_project
        shell: pwsh
        run: |
          $project = Get-ChildItem -Path . -Recurse -Include *.csproj |
            Where-Object { $_.Name -match 'Benchmark' } |
            Select-Object -First 1

          if ($null -eq $project) {
            "found=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

          "found=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "path=$($project.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore benchmark project
        if: steps.benchmark_project.outputs.found == 'true'
        run: dotnet restore "${{ steps.benchmark_project.outputs.path }}"

      - name: Run benchmarks (Release)
        if: steps.benchmark_project.outputs.found == 'true'
        run: dotnet run --project "${{ steps.benchmark_project.outputs.path }}" -c Release -- --artifacts ./BenchmarkDotNet.Artifacts

      - name: Note missing benchmark project
        if: steps.benchmark_project.outputs.found != 'true'
        run: Write-Host "No benchmark project found. Workflow completed without running benchmarks."

      - name: Upload benchmark artifacts
        if: steps.benchmark_project.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: BenchmarkDotNet.Artifacts
          if-no-files-found: warn
