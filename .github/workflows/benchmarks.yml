name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  benchmarks:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Find benchmark project
        id: benchmark_project
        shell: pwsh
        run: |
          $project = & ".github/scripts/Find-BenchmarkProject.ps1" -Root "."
          "path=$project" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore benchmark project
        run: dotnet restore "${{ steps.benchmark_project.outputs.path }}"

      - name: Run benchmarks (Release)
        run: dotnet run --project "${{ steps.benchmark_project.outputs.path }}" -c Release -- --artifacts ./BenchmarkDotNet.Artifacts

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: BenchmarkDotNet.Artifacts
          if-no-files-found: warn
